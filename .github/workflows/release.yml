name: release

# v로 시작하는 태그(예: v0.1.0)를 푸시하면 실행된다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 같은 태그로 워크플로가 중복 실행되면 두 실행의 산출물이 섞여 latest.json 의 서명과
# 실제 업로드된 자산이 어긋난다(v0.1.8 macOS 업데이트 실패의 원인).
# 취소하지 않고 순차 실행시켜, 뒤 실행이 앞 실행의 최종 latest.json 위에 병합하게 한다.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write # 릴리스 생성/자산 업로드
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: Intel + Apple Silicon 모두 지원하는 유니버설 바이너리
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Windows: .msi / .exe(NSIS)
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust 캐시
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 프론트엔드 의존성 설치
        run: npm ci

      - name: 빌드 · 서명 · 릴리스
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 업데이트 아티팩트 서명(minisign) — 필수
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 코드사이닝을 켜려면 아래 블록의 주석을 해제하고 GitHub Secrets 를 등록한다.
          # (빈 값이면 tauri-action 이 빈 인증서를 import 하려다 실패하므로, 인증서가 있을 때만 추가할 것)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DB Studio ${{ github.ref_name }}"
          releaseBody: "자산(Assets)에서 설치 파일을 내려받으세요. 설치된 앱은 이후 자동으로 업데이트됩니다."
          # draft 로 올려 두고, publish 잡의 서명 검증을 통과해야 공개한다.
          # draft 릴리스는 /releases/latest/download/ 로 노출되지 않으므로
          # 검증 전 아티팩트가 업데이터에 도달하지 않는다.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 업데이터가 실제로 쓰는 latest.json 이 릴리스에 올라간 .sig 와 일치하는지 확인한 뒤에만 공개한다.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 릴리스 draft 해제
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: 업데이터 자산 내려받기
        run: gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p 'latest.json' -p '*.sig' -D verify

      - name: latest.json 서명 정합성 검증
        run: |
          python3 - <<'PY'
          import json, os, pathlib, sys
          from urllib.parse import unquote

          d = pathlib.Path("verify")
          data = json.loads((d / "latest.json").read_text())
          tag = os.environ["TAG"]
          errors = []

          if data["version"] != tag.lstrip("v"):
              errors.append(f'latest.json version={data["version"]} 이 태그 {tag} 와 다름')

          for name, p in data["platforms"].items():
              url = p["url"]
              if f"/download/{tag}/" not in url:
                  errors.append(f"{name}: url 이 {tag} 가 아닌 다른 릴리스를 가리킴 -> {url}")
              sig = d / (unquote(url.rsplit("/", 1)[-1]) + ".sig")
              if not sig.exists():
                  errors.append(f"{name}: 서명 파일 없음 ({sig.name})")
              elif sig.read_text().strip() != p["signature"].strip():
                  errors.append(f"{name}: latest.json 서명이 {sig.name} 과 불일치 (중복 실행으로 자산이 섞였을 수 있음)")

          if errors:
              print("업데이터 아티팩트 검증 실패:", *errors, sep="\n  - ")
              sys.exit(1)
          print(f"플랫폼 {len(data['platforms'])}개 서명 정합성 확인 완료")
          PY

      - name: 릴리스 공개
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
